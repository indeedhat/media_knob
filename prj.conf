CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=12288
# CONFIG_MAIN_STACK_SIZE=4096
# CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=8192
# CONFIG_USB_WORKQUEUE_STACK_SIZE=4096
# CONFIG_HEAP_MEM_POOL_SIZE=32768

CONFIG_GPIO=y
CONFIG_INPUT=y

# fix bootloader offset
CONFIG_FLASH_LOAD_OFFSET=0x1000
CONFIG_BOARD_HAS_NRF5_BOOTLOADER=y
CONFIG_USE_DT_CODE_PARTITION=n

# build uf2 bin
CONFIG_BUILD_OUTPUT_UF2=y

# USB USBD (new API) - HID + CDC ACM console
CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_CDC_ACM_SERIAL_INITIALIZE_AT_BOOT=n
CONFIG_USBD_HID_SUPPORT=y
CONFIG_SAMPLE_USBD_PID=0x0007

# Logging
CONFIG_LOG=y
CONFIG_USBD_LOG_LEVEL_WRN=y
CONFIG_USBD_HID_LOG_LEVEL_WRN=y
CONFIG_UDC_DRIVER_LOG_LEVEL_WRN=y

# Console on CDC ACM
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_STDOUT_CONSOLE=y

# AS5600 sensor
CONFIG_SENSOR=y
CONFIG_AMS_AS5600=y
CONFIG_I2C=y

# Storage
CONFIG_SETTINGS=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH=y
CONFIG_NVS=y

# Bluetooth
CONFIG_BT=y
CONFIG_BT_SMP=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DIS=y
CONFIG_BT_BAS=y
CONFIG_BT_DEVICE_NAME="Media Knob!"
CONFIG_BT_DEVICE_APPEARANCE=962
CONFIG_BT_SETTINGS=y

CONFIG_BT_BUF_ACL_TX_SIZE=27
CONFIG_BT_BUF_ACL_RX_SIZE=69
CONFIG_BT_L2CAP_TX_MTU=65

# swd debug
CONFIG_ASSERT=y
CONFIG_FAULT_DUMP=2
#CONFIG_CDC_ACM_SERIAL_INITIALIZE_AT_BOOT=y
